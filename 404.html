<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            gap: 24px;
        }

        h1 {
            font-size: 5rem;
            color: #4a9eff;
            letter-spacing: 4px;
        }

        p {
            font-size: 1.1rem;
            color: #888;
            letter-spacing: 1px;
        }

        a {
            color: #4a9eff;
            text-decoration: none;
            font-size: 1rem;
            border: 1px solid #4a9eff;
            padding: 10px 24px;
            letter-spacing: 2px;
            transition: background 0.2s, color 0.2s;
        }

        a:hover {
            background: #4a9eff;
            color: #0a0a1a;
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>Page not found.</p>
    <a href="/">PLAY SNAKE</a>
</body>
</html>
