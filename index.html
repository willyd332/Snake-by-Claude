<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game — The Blue Computer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 1.4rem;
            color: #4a9eff;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        #hud {
            display: flex;
            gap: 32px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        #hud span {
            color: #888;
        }

        #hud .value {
            color: #4a9eff;
            font-weight: bold;
        }

        #powerUpHud {
            display: none;
        }

        #powerUpHud .value {
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        canvas {
            border: 2px solid #1a3a5c;
            border-radius: 4px;
            background: #0d1117;
        }

        #message {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #666;
            height: 20px;
        }

        #message.active {
            color: #4a9eff;
        }

        #message.levelup {
            color: #f59e0b;
            font-weight: bold;
            animation: pulse 0.5s ease-in-out 3;
        }

        #message.narrative {
            color: #8888aa;
            font-style: italic;
            letter-spacing: 1px;
        }

        #message.rainbow {
            background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #0077ff, #8b00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
            animation: pulse 0.3s ease-in-out 6;
        }

        #message.powerup-msg {
            font-weight: bold;
            letter-spacing: 1px;
            animation: pulse 0.4s ease-in-out 2;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <h1>SNAKE</h1>
    <div id="hud">
        <div><span>Score:</span> <span class="value" id="score">0</span></div>
        <div><span>Level:</span> <span class="value" id="level">1</span></div>
        <div><span>High:</span> <span class="value" id="highScore">0</span></div>
        <div id="powerUpHud"><span class="value" id="powerUpName"></span></div>
        <div id="arenaHud" style="display:none"><span>Arena:</span> <span class="value" id="arenaSize"></span></div>
    </div>
    <canvas id="game" width="400" height="400"></canvas>
    <div id="message">Press any arrow key to start</div>

    <script>
    (function() {
        'use strict';

        // --- Constants ---
        var GRID_SIZE = 20;
        var CELL_SIZE = 20;
        var CANVAS_SIZE = GRID_SIZE * CELL_SIZE;
        var FOOD_TO_LEVEL_UP = 5;
        var POWER_UP_SPAWN_INTERVAL = 15;
        var POWER_UP_DESPAWN_TICKS = 40;

        var LEVEL_CONFIG = {
            1: { speed: 150, color: '#22c55e', foodColor: '#ef4444', wallColor: null,      bgAccent: '#0d1117', gridAlpha: 0.03, obstacleColor: null, portalColor: null, fogRadius: null, wrapAround: false, powerUpsEnabled: false },
            2: { speed: 120, color: '#3b82f6', foodColor: '#f59e0b', wallColor: '#1e3a5f', bgAccent: '#0d1320', gridAlpha: 0.04, obstacleColor: null, portalColor: null, fogRadius: null, wrapAround: false, powerUpsEnabled: false },
            3: { speed: 90,  color: '#a855f7', foodColor: '#ec4899', wallColor: '#3b1f5e', bgAccent: '#130d1a', gridAlpha: 0.05, obstacleColor: '#7c3aed', portalColor: null, fogRadius: null, wrapAround: false, powerUpsEnabled: false },
            4: { speed: 75,  color: '#f97316', foodColor: '#06b6d4', wallColor: '#78350f', bgAccent: '#1a0f0a', gridAlpha: 0.06, obstacleColor: '#ea580c', portalColor: null, fogRadius: null, wrapAround: false, powerUpsEnabled: false },
            5: { speed: 60,  color: '#06b6d4', foodColor: '#f43f5e', wallColor: '#164e63', bgAccent: '#0a1419', gridAlpha: 0.07, obstacleColor: '#0891b2', portalColor: '#8b5cf6', fogRadius: null, wrapAround: false, powerUpsEnabled: false },
            6: { speed: 50,  color: '#e11d48', foodColor: '#fbbf24', wallColor: '#4a1a2e', bgAccent: '#0a0508', gridAlpha: 0.02, obstacleColor: '#be123c', portalColor: '#a855f7', fogRadius: 5, wrapAround: false, powerUpsEnabled: false },
            7: { speed: 55,  color: '#eab308', foodColor: '#f43f5e', wallColor: '#5c4200', bgAccent: '#0a0800', gridAlpha: 0.04, obstacleColor: '#b45309', portalColor: null, fogRadius: null, wrapAround: true, powerUpsEnabled: true },
            8: { speed: 65,  color: '#dc2626', foodColor: '#34d399', wallColor: '#7f1d1d', bgAccent: '#0a0505', gridAlpha: 0.03, obstacleColor: '#b91c1c', portalColor: null, fogRadius: null, wrapAround: true, powerUpsEnabled: true, hunterEnabled: true, hunterColor: '#f97316', hunterTickInterval: 3 },
            9: { speed: 75,  color: '#14b8a6', foodColor: '#fbbf24', wallColor: '#115e59', bgAccent: '#042f2e', gridAlpha: 0.03, obstacleColor: '#0d9488', portalColor: null, fogRadius: null, wrapAround: false, powerUpsEnabled: true, hunterEnabled: false, hunterColor: null, hunterTickInterval: null, shrinkingArena: true, shrinkInterval: 3 },
        };

        var MAX_LEVEL = Object.keys(LEVEL_CONFIG).length;

        // --- Power-up definitions ---
        var POWER_UP_TYPES = [
            { type: 'timeSlow', name: 'SLOW', color: '#60a5fa', glowColor: '#3b82f6', duration: 40 },
            { type: 'ghost', name: 'GHOST', color: '#e2e8f0', glowColor: '#94a3b8', duration: 30 },
        ];

        // --- Level narratives ---
        var LEVEL_NARRATIVES = {
            2: 'Ancient stones rise from the ground...',
            3: 'Shadows move in the corridors. You are not alone.',
            4: 'The cage tightens. Fire guards every exit.',
            5: 'Reality bends. Portals tear through space itself.',
            6: 'Darkness falls. Only your glow lights the way.',
            7: 'The walls dissolve. The world folds in on itself.',
            8: 'It awakens. Something ancient hunts you now.',
            9: 'The walls remember. And they are closing in.',
        };

        // --- Konami code ---
        var KONAMI_SEQUENCE = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight'];
        var konamiProgress = 0;
        var konamiActivated = localStorage.getItem('snake-konami') === 'true';

        // --- Wall patterns ---
        function generateWalls(level) {
            var walls = [];
            if (level <= 1) return walls;

            if (level === 2) {
                // Diamond pattern: four short segments around center
                [8, 9, 10, 11].forEach(function(x) { walls.push({ x: x, y: 5 }); });
                [8, 9, 10, 11].forEach(function(x) { walls.push({ x: x, y: 14 }); });
                [8, 9, 10, 11].forEach(function(y) { walls.push({ x: 5, y: y }); });
                [8, 9, 10, 11].forEach(function(y) { walls.push({ x: 14, y: y }); });
                return walls;
            }

            if (level === 3) {
                // Corridor pattern with pillars
                [2, 3, 4, 5, 6, 7].forEach(function(x) { walls.push({ x: x, y: 6 }); });
                [12, 13, 14, 15, 16, 17].forEach(function(x) { walls.push({ x: x, y: 6 }); });
                [2, 3, 4, 5, 6, 7].forEach(function(x) { walls.push({ x: x, y: 13 }); });
                [12, 13, 14, 15, 16, 17].forEach(function(x) { walls.push({ x: x, y: 13 }); });
                [3, 4, 5].forEach(function(y) { walls.push({ x: 10, y: y }); });
                [14, 15, 16].forEach(function(y) { walls.push({ x: 10, y: y }); });
                walls.push({ x: 3, y: 3 }, { x: 16, y: 3 });
                walls.push({ x: 3, y: 16 }, { x: 16, y: 16 });
                return walls;
            }

            if (level === 4) {
                // Cage ring with cardinal gaps
                [5, 6, 7, 8, 11, 12, 13, 14].forEach(function(x) { walls.push({ x: x, y: 4 }); });
                [5, 6, 7, 8, 11, 12, 13, 14].forEach(function(x) { walls.push({ x: x, y: 15 }); });
                [5, 6, 7, 8, 11, 12, 13, 14].forEach(function(y) { walls.push({ x: 4, y: y }); });
                [5, 6, 7, 8, 11, 12, 13, 14].forEach(function(y) { walls.push({ x: 15, y: y }); });
                // Inner cross pillars
                walls.push({ x: 9, y: 7 }, { x: 10, y: 7 });
                walls.push({ x: 9, y: 12 }, { x: 10, y: 12 });
                walls.push({ x: 7, y: 9 }, { x: 7, y: 10 });
                walls.push({ x: 12, y: 9 }, { x: 12, y: 10 });
                return walls;
            }

            if (level === 5) {
                // Labyrinth chambers with portal access
                // Top-left chamber
                [3, 4, 5, 6, 7].forEach(function(x) { walls.push({ x: x, y: 3 }); });
                [3, 4, 5, 6, 7].forEach(function(x) { walls.push({ x: x, y: 8 }); });
                [4, 5, 6, 7].forEach(function(y) { walls.push({ x: 3, y: y }); });
                // Bottom-right chamber
                [12, 13, 14, 15, 16].forEach(function(x) { walls.push({ x: x, y: 11 }); });
                [12, 13, 14, 15, 16].forEach(function(x) { walls.push({ x: x, y: 16 }); });
                [12, 13, 14, 15].forEach(function(y) { walls.push({ x: 16, y: y }); });
                // Central divider with gaps
                [0, 1, 2, 3, 4, 5, 6, 7].forEach(function(x) { walls.push({ x: x, y: 10 }); });
                [12, 13, 14, 15, 16, 17, 18, 19].forEach(function(x) { walls.push({ x: x, y: 9 }); });
                return walls;
            }

            if (level === 6) {
                // Scattered ruins — hard to memorize in the dark
                walls.push({ x: 3, y: 3 }, { x: 4, y: 3 });
                walls.push({ x: 15, y: 2 }, { x: 16, y: 2 });
                walls.push({ x: 8, y: 5 }, { x: 9, y: 5 }, { x: 10, y: 5 });
                walls.push({ x: 1, y: 8 }, { x: 2, y: 8 });
                walls.push({ x: 17, y: 7 }, { x: 17, y: 8 });
                walls.push({ x: 6, y: 11 }, { x: 7, y: 11 });
                walls.push({ x: 12, y: 10 }, { x: 13, y: 10 }, { x: 13, y: 11 });
                walls.push({ x: 5, y: 15 }, { x: 5, y: 16 });
                walls.push({ x: 10, y: 14 }, { x: 11, y: 14 });
                walls.push({ x: 14, y: 16 }, { x: 15, y: 16 }, { x: 16, y: 16 });
                walls.push({ x: 18, y: 13 });
                walls.push({ x: 2, y: 18 }, { x: 3, y: 18 });
                walls.push({ x: 9, y: 17 });
                return walls;
            }

            if (level === 7) {
                // Interior pillars and bars — no border walls since wrap-around
                // Horizontal bars near center
                [7, 8, 9, 10].forEach(function(x) { walls.push({ x: x, y: 7 }); });
                [9, 10, 11, 12].forEach(function(x) { walls.push({ x: x, y: 12 }); });
                // Corner pillars
                walls.push({ x: 3, y: 3 }, { x: 4, y: 3 });
                walls.push({ x: 15, y: 3 }, { x: 16, y: 3 });
                walls.push({ x: 3, y: 16 }, { x: 4, y: 16 });
                walls.push({ x: 15, y: 16 }, { x: 16, y: 16 });
                // Scattered singles for variety
                walls.push({ x: 5, y: 10 });
                walls.push({ x: 14, y: 9 });
                walls.push({ x: 8, y: 15 });
                walls.push({ x: 11, y: 4 });
                return walls;
            }

            if (level === 9) {
                // Scattered pillars — your only cover as the walls close in
                walls.push({ x: 5, y: 5 }, { x: 6, y: 5 });
                walls.push({ x: 13, y: 5 }, { x: 14, y: 5 });
                walls.push({ x: 5, y: 14 }, { x: 6, y: 14 });
                walls.push({ x: 13, y: 14 }, { x: 14, y: 14 });
                walls.push({ x: 9, y: 9 }, { x: 10, y: 9 });
                walls.push({ x: 9, y: 10 }, { x: 10, y: 10 });
                return walls;
            }

            // Level 8: Sparse cover barriers — use them to hide from the hunter
            // Central cross (short arms with gaps)
            walls.push({ x: 9, y: 9 }, { x: 10, y: 9 });
            walls.push({ x: 9, y: 10 }, { x: 10, y: 10 });
            // Corner shelters (L-shapes for ducking behind)
            walls.push({ x: 3, y: 3 }, { x: 4, y: 3 }, { x: 3, y: 4 });
            walls.push({ x: 15, y: 3 }, { x: 16, y: 3 }, { x: 16, y: 4 });
            walls.push({ x: 3, y: 15 }, { x: 3, y: 16 }, { x: 4, y: 16 });
            walls.push({ x: 16, y: 15 }, { x: 16, y: 16 }, { x: 15, y: 16 });
            // Mid-edge pillars for additional cover
            walls.push({ x: 9, y: 3 }, { x: 10, y: 3 });
            walls.push({ x: 9, y: 16 }, { x: 10, y: 16 });
            walls.push({ x: 3, y: 9 }, { x: 3, y: 10 });
            walls.push({ x: 16, y: 9 }, { x: 16, y: 10 });

            return walls;
        }

        function filterWallsFromSnake(walls, snake) {
            return walls.filter(function(w) {
                return !snake.some(function(seg) { return seg.x === w.x && seg.y === w.y; });
            });
        }

        // --- Moving obstacles ---
        function generateObstacles(level) {
            if (level < 3) return [];

            if (level === 3) {
                // Two horizontal patrols through corridor gaps
                return [
                    { x: 8, y: 9, path: [8, 9, 10, 11], axis: 'x', pathIndex: 0, dir: 1 },
                    { x: 11, y: 10, path: [11, 10, 9, 8], axis: 'x', pathIndex: 0, dir: 1 },
                ];
            }

            if (level === 4) {
                // Four patrols circling through cage gaps
                return [
                    { x: 9, y: 1, path: [1, 2, 3], axis: 'y', pathIndex: 0, dir: 1 },
                    { x: 10, y: 16, path: [16, 17, 18], axis: 'y', pathIndex: 0, dir: 1 },
                    { x: 1, y: 9, path: [1, 2, 3], axis: 'x', pathIndex: 0, dir: 1 },
                    { x: 18, y: 10, path: [18, 17, 16], axis: 'x', pathIndex: 0, dir: 1 },
                ];
            }

            if (level === 5) {
                // Two patrols near central divider gaps + one in top-left chamber
                return [
                    { x: 8, y: 9, path: [8, 9, 10, 11], axis: 'x', pathIndex: 0, dir: 1 },
                    { x: 11, y: 10, path: [11, 10, 9, 8], axis: 'x', pathIndex: 0, dir: 1 },
                    { x: 4, y: 5, path: [5, 6, 7], axis: 'y', pathIndex: 0, dir: 1 },
                ];
            }

            if (level === 6) {
                // Two patrols lurking in the darkness
                return [
                    { x: 5, y: 7, path: [5, 6, 7, 8, 9], axis: 'x', pathIndex: 0, dir: 1 },
                    { x: 14, y: 13, path: [13, 12, 11, 10], axis: 'y', pathIndex: 0, dir: 1 },
                ];
            }

            if (level === 7) {
                // Three fast patrols in open space
                return [
                    { x: 3, y: 5, path: [3, 4, 5, 6, 7, 8], axis: 'x', pathIndex: 0, dir: 1 },
                    { x: 15, y: 10, path: [10, 11, 12, 13, 14, 15], axis: 'y', pathIndex: 0, dir: 1 },
                    { x: 11, y: 14, path: [11, 12, 13, 14, 15, 16], axis: 'x', pathIndex: 0, dir: 1 },
                ];
            }

            if (level === 9) {
                // Single patrol weaving through the center
                return [
                    { x: 7, y: 7, path: [7, 8, 9, 10, 11, 12], axis: 'x', pathIndex: 0, dir: 1 },
                ];
            }

            // Level 8: Two patrols adding chaos alongside the hunter
            return [
                { x: 6, y: 6, path: [6, 7, 8], axis: 'x', pathIndex: 0, dir: 1 },
                { x: 13, y: 13, path: [13, 12, 11], axis: 'y', pathIndex: 0, dir: 1 },
            ];
        }

        function moveObstacles(obstacles) {
            return obstacles.map(function(ob) {
                var nextIdx = ob.pathIndex + ob.dir;
                var newDir = ob.dir;
                if (nextIdx >= ob.path.length || nextIdx < 0) {
                    newDir = -ob.dir;
                    nextIdx = ob.pathIndex + newDir;
                }
                var newOb = { x: ob.x, y: ob.y, path: ob.path, axis: ob.axis, pathIndex: nextIdx, dir: newDir };
                if (ob.axis === 'x') {
                    newOb.x = ob.path[nextIdx];
                } else {
                    newOb.y = ob.path[nextIdx];
                }
                return newOb;
            });
        }

        function getObstaclePositions(obstacles) {
            return obstacles.map(function(ob) { return { x: ob.x, y: ob.y }; });
        }

        // --- Teleport portals ---
        function generatePortals(level) {
            if (level === 5) {
                // Two portal pairs bridging the labyrinth chambers
                return [
                    { a: { x: 5, y: 5 }, b: { x: 14, y: 14 } },
                    { a: { x: 1, y: 15 }, b: { x: 18, y: 4 } },
                ];
            }

            if (level === 6) {
                // One portal pair — a lifeline in the dark
                return [
                    { a: { x: 2, y: 2 }, b: { x: 17, y: 17 } },
                ];
            }

            return [];
        }

        function getPortalPositions(portals) {
            var positions = [];
            portals.forEach(function(pair) {
                positions.push(pair.a);
                positions.push(pair.b);
            });
            return positions;
        }

        function checkPortalTeleport(head, portals) {
            for (var i = 0; i < portals.length; i++) {
                var pair = portals[i];
                if (head.x === pair.a.x && head.y === pair.a.y) {
                    return pair.b;
                }
                if (head.x === pair.b.x && head.y === pair.b.y) {
                    return pair.a;
                }
            }
            return null;
        }

        // --- Power-up system ---
        function spawnPowerUp(snake, walls, obstacles, portals, food, currentPowerUp, hunter) {
            if (currentPowerUp) return currentPowerUp;
            var typeDef = POWER_UP_TYPES[Math.floor(Math.random() * POWER_UP_TYPES.length)];
            var hunterPositions = hunter ? getHunterPositions(hunter) : [];
            var occupied = (walls || []).concat(snake).concat(getObstaclePositions(obstacles || [])).concat(getPortalPositions(portals || [])).concat(hunterPositions);
            if (food) occupied = occupied.concat([food]);
            var pos;
            var attempts = 0;
            do {
                pos = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE),
                };
                attempts++;
                if (attempts > 1000) return null;
            } while (occupied.some(function(seg) { return seg.x === pos.x && seg.y === pos.y; }));
            return { x: pos.x, y: pos.y, type: typeDef.type, ticksLeft: POWER_UP_DESPAWN_TICKS };
        }

        function getPowerUpDef(type) {
            for (var i = 0; i < POWER_UP_TYPES.length; i++) {
                if (POWER_UP_TYPES[i].type === type) return POWER_UP_TYPES[i];
            }
            return null;
        }

        // --- Hunter snake AI ---
        function generateHunter(level) {
            var config = LEVEL_CONFIG[level];
            if (!config || !config.hunterEnabled) return null;
            return {
                segments: [{ x: 17, y: 17 }, { x: 18, y: 17 }, { x: 19, y: 17 }],
                direction: { x: -1, y: 0 },
                moveCounter: 0,
                growPending: 0,
            };
        }

        function getHunterPositions(hunter) {
            if (!hunter) return [];
            return hunter.segments.map(function(s) { return { x: s.x, y: s.y }; });
        }

        function manhattanDistance(a, b, wrap) {
            if (wrap) {
                var dx = Math.abs(a.x - b.x);
                var dy = Math.abs(a.y - b.y);
                return Math.min(dx, GRID_SIZE - dx) + Math.min(dy, GRID_SIZE - dy);
            }
            return Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
        }

        function moveHunter(hunter, targetHead, walls, obstacles, config) {
            if (!hunter) return null;
            var newCounter = hunter.moveCounter + 1;
            var interval = config.hunterTickInterval || 3;
            if (newCounter < interval) {
                return Object.assign({}, hunter, { moveCounter: newCounter });
            }
            // Time to move
            var head = hunter.segments[0];
            var directions = [
                { x: 0, y: -1 },
                { x: 0, y: 1 },
                { x: -1, y: 0 },
                { x: 1, y: 0 },
            ];
            // Filter out 180-degree reversal
            directions = directions.filter(function(d) {
                return !(d.x + hunter.direction.x === 0 && d.y + hunter.direction.y === 0);
            });
            var wrap = config.wrapAround;
            var obPositions = obstacles ? getObstaclePositions(obstacles) : [];
            // Score each direction
            var scored = directions.map(function(d) {
                var nextPos = { x: head.x + d.x, y: head.y + d.y };
                if (wrap) {
                    nextPos = { x: (nextPos.x + GRID_SIZE) % GRID_SIZE, y: (nextPos.y + GRID_SIZE) % GRID_SIZE };
                } else if (nextPos.x < 0 || nextPos.x >= GRID_SIZE || nextPos.y < 0 || nextPos.y >= GRID_SIZE) {
                    return { dir: d, pos: nextPos, dist: 9999, blocked: true };
                }
                // Check wall collision
                var hitsWall = walls.some(function(w) { return w.x === nextPos.x && w.y === nextPos.y; });
                // Check self collision (skip tail if not growing, since it will move)
                var bodyToCheck = hunter.growPending > 0 ? hunter.segments : hunter.segments.slice(0, -1);
                var hitsSelf = bodyToCheck.some(function(s) { return s.x === nextPos.x && s.y === nextPos.y; });
                // Check obstacle collision
                var hitsObstacle = obPositions.some(function(o) { return o.x === nextPos.x && o.y === nextPos.y; });
                var blocked = hitsWall || hitsSelf || hitsObstacle;
                var dist = manhattanDistance(nextPos, targetHead, wrap);
                return { dir: d, pos: nextPos, dist: dist, blocked: blocked };
            });
            // Prefer unblocked, then minimum distance
            scored.sort(function(a, b) {
                if (a.blocked !== b.blocked) return a.blocked ? 1 : -1;
                return a.dist - b.dist;
            });
            var best = scored[0];
            if (best.blocked) {
                // All directions blocked — stay in place, reset counter
                return Object.assign({}, hunter, { moveCounter: 0 });
            }
            var newHead = best.pos;
            var newDir = best.dir;
            var growing = hunter.growPending > 0;
            var newSegments = [newHead].concat(growing ? hunter.segments : hunter.segments.slice(0, -1));
            var newGrow = growing ? hunter.growPending - 1 : 0;
            return {
                segments: newSegments,
                direction: newDir,
                moveCounter: 0,
                growPending: newGrow,
            };
        }

        // --- Canvas setup ---
        var canvas = document.getElementById('game');
        var ctx = canvas.getContext('2d');
        canvas.width = CANVAS_SIZE;
        canvas.height = CANVAS_SIZE;

        var scoreEl = document.getElementById('score');
        var levelEl = document.getElementById('level');
        var highScoreEl = document.getElementById('highScore');
        var messageEl = document.getElementById('message');
        var powerUpHudEl = document.getElementById('powerUpHud');
        var powerUpNameEl = document.getElementById('powerUpName');
        var arenaHudEl = document.getElementById('arenaHud');
        var arenaSizeEl = document.getElementById('arenaSize');

        // --- Level-up message with narrative ---
        var levelUpTimer = null;

        function showLevelUp(level) {
            messageEl.textContent = 'LEVEL ' + level + '!';
            messageEl.className = 'levelup';
            if (levelUpTimer) clearTimeout(levelUpTimer);
            levelUpTimer = setTimeout(function() {
                var narrative = LEVEL_NARRATIVES[level];
                if (narrative) {
                    messageEl.textContent = narrative;
                    messageEl.className = 'narrative';
                    levelUpTimer = setTimeout(function() {
                        messageEl.textContent = '';
                        messageEl.className = '';
                        levelUpTimer = null;
                    }, 3000);
                } else {
                    messageEl.textContent = '';
                    messageEl.className = '';
                    levelUpTimer = null;
                }
            }, 1500);
        }

        // --- Power-up collection message ---
        var powerUpMsgTimer = null;

        // --- Shrink warning message ---
        var shrinkMsgTimer = null;

        function showShrinkMessage() {
            messageEl.textContent = 'THE WALLS CLOSE IN';
            messageEl.className = 'powerup-msg';
            messageEl.style.color = '#ef4444';
            if (shrinkMsgTimer) clearTimeout(shrinkMsgTimer);
            shrinkMsgTimer = setTimeout(function() {
                messageEl.textContent = '';
                messageEl.className = '';
                messageEl.style.color = '';
                shrinkMsgTimer = null;
            }, 1500);
        }

        function showPowerUpCollected(typeDef) {
            messageEl.textContent = typeDef.name + ' ACTIVATED';
            messageEl.className = 'powerup-msg';
            messageEl.style.color = typeDef.color;
            if (powerUpMsgTimer) clearTimeout(powerUpMsgTimer);
            powerUpMsgTimer = setTimeout(function() {
                messageEl.textContent = '';
                messageEl.className = '';
                messageEl.style.color = '';
                powerUpMsgTimer = null;
            }, 1500);
        }

        // --- State ---
        function createInitialState() {
            return {
                snake: [{ x: 10, y: 10 }],
                direction: { x: 0, y: 0 },
                nextDirection: { x: 0, y: 0 },
                food: null,
                walls: [],
                obstacles: [],
                portals: [],
                powerUp: null,
                activePowerUp: null,
                powerUpSpawnCounter: 0,
                hunter: null,
                score: 0,
                level: 1,
                foodEaten: 0,
                gameOver: false,
                started: false,
                lastTick: 0,
                arenaMinX: 0,
                arenaMinY: 0,
                arenaMaxX: GRID_SIZE - 1,
                arenaMaxY: GRID_SIZE - 1,
                shrinkCounter: 0,
            };
        }

        var state = createInitialState();
        var highScore = parseInt(localStorage.getItem('snake-highscore') || '0', 10);
        highScoreEl.textContent = highScore;

        // --- Pure helpers ---
        function randomPosition(snake, walls, obstacles, portals, powerUp, hunter) {
            var obPositions = obstacles ? getObstaclePositions(obstacles) : [];
            var portalPositions = portals ? getPortalPositions(portals) : [];
            var hunterPositions = hunter ? getHunterPositions(hunter) : [];
            var occupied = (walls || []).concat(snake).concat(obPositions).concat(portalPositions).concat(hunterPositions);
            if (powerUp) occupied = occupied.concat([powerUp]);
            var pos;
            var attempts = 0;
            do {
                pos = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE),
                };
                attempts++;
                if (attempts > 1000) return pos;
            } while (occupied.some(function(seg) { return seg.x === pos.x && seg.y === pos.y; }));
            return pos;
        }

        function getLevelConfig(level) {
            var clamped = Math.min(level, MAX_LEVEL);
            return LEVEL_CONFIG[clamped];
        }

        function collides(pos, segments) {
            return segments.some(function(seg) { return seg.x === pos.x && seg.y === pos.y; });
        }

        // --- State transitions (immutable) ---
        function tick(prev) {
            if (prev.gameOver || !prev.started) return prev;

            var dir = prev.nextDirection;
            if (dir.x === 0 && dir.y === 0) return prev;

            var config = getLevelConfig(prev.level);
            var isGhost = prev.activePowerUp && prev.activePowerUp.type === 'ghost';
            var head = prev.snake[0];
            var newHead = { x: head.x + dir.x, y: head.y + dir.y };

            // Boundary: wrap-around or collision
            if (config.wrapAround || isGhost) {
                newHead = {
                    x: (newHead.x + GRID_SIZE) % GRID_SIZE,
                    y: (newHead.y + GRID_SIZE) % GRID_SIZE,
                };
            } else if (newHead.x < 0 || newHead.x >= GRID_SIZE ||
                       newHead.y < 0 || newHead.y >= GRID_SIZE) {
                return Object.assign({}, prev, { gameOver: true, direction: dir });
            }

            // Shrinking arena boundary — cannot be bypassed even with ghost
            if (config.shrinkingArena) {
                if (newHead.x < prev.arenaMinX || newHead.x > prev.arenaMaxX ||
                    newHead.y < prev.arenaMinY || newHead.y > prev.arenaMaxY) {
                    return Object.assign({}, prev, { gameOver: true, direction: dir });
                }
            }

            // Wall obstacle collision (ghost passes through)
            if (!isGhost && collides(newHead, prev.walls)) {
                return Object.assign({}, prev, { gameOver: true, direction: dir });
            }

            // Self collision (ghost passes through)
            if (!isGhost && collides(newHead, prev.snake)) {
                return Object.assign({}, prev, { gameOver: true, direction: dir });
            }

            // Moving obstacle collision (always fatal, even with ghost)
            if (prev.obstacles.length > 0 && collides(newHead, getObstaclePositions(prev.obstacles))) {
                return Object.assign({}, prev, { gameOver: true, direction: dir });
            }

            // Hunter collision (ghost passes through hunter body but not head)
            if (prev.hunter) {
                var hunterHead = prev.hunter.segments[0];
                var hitHunterHead = newHead.x === hunterHead.x && newHead.y === hunterHead.y;
                if (hitHunterHead) {
                    return Object.assign({}, prev, { gameOver: true, direction: dir });
                }
                if (!isGhost && prev.hunter.segments.length > 1) {
                    var hunterBody = prev.hunter.segments.slice(1);
                    if (collides(newHead, hunterBody)) {
                        return Object.assign({}, prev, { gameOver: true, direction: dir });
                    }
                }
            }

            // Portal teleportation
            if (prev.portals.length > 0) {
                var teleportDest = checkPortalTeleport(newHead, prev.portals);
                if (teleportDest) {
                    newHead = { x: teleportDest.x + dir.x, y: teleportDest.y + dir.y };
                    // Boundary check after teleport
                    if (config.wrapAround || isGhost) {
                        newHead = {
                            x: (newHead.x + GRID_SIZE) % GRID_SIZE,
                            y: (newHead.y + GRID_SIZE) % GRID_SIZE,
                        };
                    } else if (newHead.x < 0 || newHead.x >= GRID_SIZE ||
                               newHead.y < 0 || newHead.y >= GRID_SIZE) {
                        return Object.assign({}, prev, { gameOver: true, direction: dir });
                    }
                    // Wall check after teleport
                    if (!isGhost && collides(newHead, prev.walls)) {
                        return Object.assign({}, prev, { gameOver: true, direction: dir });
                    }
                }
            }

            // Move obstacles
            var newObstacles = prev.obstacles.length > 0 ? moveObstacles(prev.obstacles) : prev.obstacles;

            // Check if obstacle moved onto snake body
            if (newObstacles.length > 0) {
                var obPositions = getObstaclePositions(newObstacles);
                var snakeHit = obPositions.some(function(op) { return collides(op, [newHead].concat(prev.snake)); });
                if (snakeHit) {
                    return Object.assign({}, prev, { gameOver: true, direction: dir });
                }
            }

            // Move hunter AI
            var newHunter = prev.hunter ? moveHunter(prev.hunter, newHead, prev.walls, newObstacles, config) : null;

            var ate = prev.food && newHead.x === prev.food.x && newHead.y === prev.food.y;
            var newSnake = [newHead].concat(ate ? prev.snake : prev.snake.slice(0, -1));
            var newScore = ate ? prev.score + 10 : prev.score;
            var newFoodEaten = ate ? prev.foodEaten + 1 : prev.foodEaten;
            var newLevel = prev.level;
            var newWalls = prev.walls;
            var newPortals = prev.portals;
            var newFood = ate ? null : prev.food;

            // Check if hunter moved onto player snake (use newSnake, not stale prev.snake)
            if (newHunter) {
                var newHunterHead = newHunter.segments[0];
                var playerHead = newSnake[0];
                // Head-to-head is always fatal
                if (newHunterHead.x === playerHead.x && newHunterHead.y === playerHead.y) {
                    return Object.assign({}, prev, { gameOver: true, direction: dir });
                }
                // Hunter head on player body: ghost mode protects
                if (!isGhost && newSnake.length > 1) {
                    if (collides(newHunterHead, newSnake.slice(1))) {
                        return Object.assign({}, prev, { gameOver: true, direction: dir });
                    }
                }
            }

            // Hunter grows when player eats food
            if (ate && newHunter) {
                newHunter = Object.assign({}, newHunter, { growPending: newHunter.growPending + 1 });
            }

            // Check if hunter landed on food — respawn food to prevent soft-lock
            if (newHunter && newFood) {
                var hHead = newHunter.segments[0];
                if (hHead.x === newFood.x && hHead.y === newFood.y) {
                    newHunter = Object.assign({}, newHunter, { growPending: newHunter.growPending + 1 });
                    newFood = null;
                }
            }

            // Power-up state updates
            var newPowerUp = prev.powerUp;
            var newActivePowerUp = prev.activePowerUp;
            var newPowerUpSpawnCounter = prev.powerUpSpawnCounter;
            var collectedPowerUpType = null;

            // Check power-up collection
            if (newPowerUp && newHead.x === newPowerUp.x && newHead.y === newPowerUp.y) {
                var def = getPowerUpDef(newPowerUp.type);
                newActivePowerUp = { type: newPowerUp.type, ticksLeft: def.duration };
                collectedPowerUpType = newPowerUp.type;
                newPowerUp = null;
                newPowerUpSpawnCounter = 0;
            }

            // Decrement power-up despawn timer
            if (newPowerUp) {
                newPowerUp = Object.assign({}, newPowerUp, { ticksLeft: newPowerUp.ticksLeft - 1 });
                if (newPowerUp.ticksLeft <= 0) {
                    newPowerUp = null;
                }
            }

            // Decrement active power-up duration (skip if just collected this tick)
            if (newActivePowerUp && !collectedPowerUpType) {
                newActivePowerUp = Object.assign({}, newActivePowerUp, { ticksLeft: newActivePowerUp.ticksLeft - 1 });
                if (newActivePowerUp.ticksLeft <= 0) {
                    newActivePowerUp = null;
                }
            }

            // Level up check
            if (newFoodEaten >= FOOD_TO_LEVEL_UP && newLevel < MAX_LEVEL) {
                newLevel = prev.level + 1;
                newFoodEaten = 0;
                newWalls = filterWallsFromSnake(generateWalls(newLevel), newSnake);
                newObstacles = generateObstacles(newLevel);
                newPortals = generatePortals(newLevel);
                newHunter = generateHunter(newLevel);
                newPowerUp = null;
                newActivePowerUp = null;
                newPowerUpSpawnCounter = 0;
            }

            // Shrinking arena
            var newArenaMinX = prev.arenaMinX;
            var newArenaMinY = prev.arenaMinY;
            var newArenaMaxX = prev.arenaMaxX;
            var newArenaMaxY = prev.arenaMaxY;
            var newShrinkCounter = prev.shrinkCounter;
            var shrinkOccurred = false;

            // Reset arena on level transition
            if (newLevel !== prev.level) {
                newArenaMinX = 0;
                newArenaMinY = 0;
                newArenaMaxX = GRID_SIZE - 1;
                newArenaMaxY = GRID_SIZE - 1;
                newShrinkCounter = 0;
            }

            if (ate && config.shrinkingArena && newLevel === prev.level) {
                newShrinkCounter = newShrinkCounter + 1;
                if (newShrinkCounter >= config.shrinkInterval) {
                    newShrinkCounter = 0;
                    var canShrinkH = newArenaMaxX - newArenaMinX >= 6;
                    var canShrinkV = newArenaMaxY - newArenaMinY >= 6;
                    var shrinkEdges = [];
                    if (canShrinkH) { shrinkEdges.push('left'); shrinkEdges.push('right'); }
                    if (canShrinkV) { shrinkEdges.push('top'); shrinkEdges.push('bottom'); }

                    if (shrinkEdges.length > 0) {
                        shrinkOccurred = true;
                        var edge = shrinkEdges[Math.floor(Math.random() * shrinkEdges.length)];
                        var shrinkCells = [];
                        if (edge === 'top') {
                            for (var sx = newArenaMinX; sx <= newArenaMaxX; sx++) {
                                shrinkCells.push({ x: sx, y: newArenaMinY });
                            }
                            newArenaMinY = newArenaMinY + 1;
                        } else if (edge === 'bottom') {
                            for (var sx = newArenaMinX; sx <= newArenaMaxX; sx++) {
                                shrinkCells.push({ x: sx, y: newArenaMaxY });
                            }
                            newArenaMaxY = newArenaMaxY - 1;
                        } else if (edge === 'left') {
                            for (var sy = newArenaMinY; sy <= newArenaMaxY; sy++) {
                                shrinkCells.push({ x: newArenaMinX, y: sy });
                            }
                            newArenaMinX = newArenaMinX + 1;
                        } else {
                            for (var sy = newArenaMinY; sy <= newArenaMaxY; sy++) {
                                shrinkCells.push({ x: newArenaMaxX, y: sy });
                            }
                            newArenaMaxX = newArenaMaxX - 1;
                        }
                        newWalls = newWalls.concat(shrinkCells);

                        // Check if any snake segment is crushed by closing wall
                        var snakeCrushed = newSnake.some(function(seg) {
                            return collides(seg, shrinkCells);
                        });
                        if (snakeCrushed) {
                            return Object.assign({}, prev, { gameOver: true, direction: dir });
                        }
                        // Respawn food if now inside wall
                        if (newFood && collides(newFood, shrinkCells)) {
                            newFood = null;
                        }
                        // Respawn power-up if now inside wall
                        if (newPowerUp && collides({ x: newPowerUp.x, y: newPowerUp.y }, shrinkCells)) {
                            newPowerUp = null;
                        }
                    }
                }
            }

            // Remove obstacles engulfed by shrinking arena
            if (config.shrinkingArena && newObstacles.length > 0) {
                newObstacles = newObstacles.filter(function(ob) {
                    return ob.x >= newArenaMinX && ob.x <= newArenaMaxX &&
                           ob.y >= newArenaMinY && ob.y <= newArenaMaxY;
                });
            }

            // Spawn food if needed (avoid snake, walls, obstacles, portals, power-up, and hunter)
            if (!newFood) {
                newFood = randomPosition(newSnake, newWalls, newObstacles, newPortals, newPowerUp, newHunter);
            }

            // Power-up spawning (only for levels with power-ups enabled)
            var newConfig = getLevelConfig(newLevel);
            if (newConfig.powerUpsEnabled && !newPowerUp && !collectedPowerUpType) {
                newPowerUpSpawnCounter = newPowerUpSpawnCounter + 1;
                if (newPowerUpSpawnCounter >= POWER_UP_SPAWN_INTERVAL) {
                    newPowerUp = spawnPowerUp(newSnake, newWalls, newObstacles, newPortals, newFood, null, newHunter);
                    newPowerUpSpawnCounter = 0;
                }
            }

            return {
                snake: newSnake,
                direction: dir,
                nextDirection: dir,
                food: newFood,
                walls: newWalls,
                obstacles: newObstacles,
                portals: newPortals,
                powerUp: newPowerUp,
                activePowerUp: newActivePowerUp,
                powerUpSpawnCounter: newPowerUpSpawnCounter,
                hunter: newHunter,
                score: newScore,
                level: newLevel,
                foodEaten: newFoodEaten,
                gameOver: false,
                started: true,
                lastTick: prev.lastTick,
                arenaMinX: newArenaMinX,
                arenaMinY: newArenaMinY,
                arenaMaxX: newArenaMaxX,
                arenaMaxY: newArenaMaxY,
                shrinkCounter: newShrinkCounter,
                _collectedPowerUp: collectedPowerUpType,
                _shrinkOccurred: shrinkOccurred,
            };
        }

        // --- Rendering ---
        function render(s) {
            var config = getLevelConfig(s.level);
            var isGhost = s.activePowerUp && s.activePowerUp.type === 'ghost';

            // Clear
            ctx.fillStyle = config.bgAccent;
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // Grid lines (subtle, varies by level)
            ctx.strokeStyle = 'rgba(255, 255, 255, ' + config.gridAlpha + ')';
            ctx.lineWidth = 0.5;
            for (var i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, CANVAS_SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(CANVAS_SIZE, i * CELL_SIZE);
                ctx.stroke();
            }

            // Wrap-around edge indicators (subtle glowing edges for wrap levels)
            if (config.wrapAround && s.started && !s.gameOver) {
                var edgePulse = Math.sin(Date.now() / 500) * 0.3 + 0.5;
                ctx.strokeStyle = 'rgba(234, 179, 8, ' + (edgePulse * 0.3) + ')';
                ctx.lineWidth = 2;
                ctx.strokeRect(1, 1, CANVAS_SIZE - 2, CANVAS_SIZE - 2);
                ctx.lineWidth = 0.5;
            }

            // Shrinking arena border indicator (pulsing red)
            if (config.shrinkingArena && s.started && !s.gameOver) {
                var arenaMinPx = s.arenaMinX * CELL_SIZE;
                var arenaMinPy = s.arenaMinY * CELL_SIZE;
                var arenaW = (s.arenaMaxX - s.arenaMinX + 1) * CELL_SIZE;
                var arenaH = (s.arenaMaxY - s.arenaMinY + 1) * CELL_SIZE;
                var shrinkPulse = Math.sin(Date.now() / 400) * 0.3 + 0.4;
                ctx.strokeStyle = 'rgba(239, 68, 68, ' + shrinkPulse + ')';
                ctx.lineWidth = 2;
                ctx.strokeRect(arenaMinPx + 1, arenaMinPy + 1, arenaW - 2, arenaH - 2);
                ctx.lineWidth = 0.5;
            }

            // Walls
            if (s.walls.length > 0 && config.wallColor) {
                ctx.shadowColor = config.wallColor;
                ctx.shadowBlur = 4;
                s.walls.forEach(function(w) {
                    ctx.fillStyle = config.wallColor;
                    ctx.fillRect(
                        w.x * CELL_SIZE + 1,
                        w.y * CELL_SIZE + 1,
                        CELL_SIZE - 2,
                        CELL_SIZE - 2
                    );
                    // Inner highlight
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                    ctx.fillRect(
                        w.x * CELL_SIZE + 3,
                        w.y * CELL_SIZE + 3,
                        CELL_SIZE - 6,
                        CELL_SIZE - 6
                    );
                });
                ctx.shadowBlur = 0;
            }

            // Moving obstacles
            if (s.obstacles.length > 0 && config.obstacleColor) {
                s.obstacles.forEach(function(ob) {
                    var cx = ob.x * CELL_SIZE + CELL_SIZE / 2;
                    var cy = ob.y * CELL_SIZE + CELL_SIZE / 2;
                    // Pulsing glow
                    ctx.shadowColor = config.obstacleColor;
                    ctx.shadowBlur = 10;
                    ctx.fillStyle = config.obstacleColor;
                    ctx.beginPath();
                    ctx.arc(cx, cy, CELL_SIZE / 2 - 1, 0, Math.PI * 2);
                    ctx.fill();
                    // Bright center dot
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.beginPath();
                    ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });
            }

            // Hunter snake
            if (s.hunter && config.hunterColor) {
                var hunterPulse = Math.sin(Date.now() / 250) * 0.15 + 0.85;
                s.hunter.segments.forEach(function(seg, i) {
                    var hAlpha = (1 - (i / s.hunter.segments.length) * 0.4) * hunterPulse;
                    ctx.globalAlpha = hAlpha;
                    ctx.fillStyle = config.hunterColor;
                    ctx.shadowColor = config.hunterColor;
                    ctx.shadowBlur = i === 0 ? 8 : 3;
                    var hPad = i === 0 ? 1 : 2;
                    ctx.fillRect(
                        seg.x * CELL_SIZE + hPad,
                        seg.y * CELL_SIZE + hPad,
                        CELL_SIZE - hPad * 2,
                        CELL_SIZE - hPad * 2
                    );
                    // Hunter head: direction-aware menacing eyes
                    if (i === 0) {
                        ctx.globalAlpha = 1;
                        ctx.fillStyle = '#ff0000';
                        ctx.shadowColor = '#ff0000';
                        ctx.shadowBlur = 4;
                        var hcx = seg.x * CELL_SIZE + CELL_SIZE / 2;
                        var hcy = seg.y * CELL_SIZE + CELL_SIZE / 2;
                        var hDir = s.hunter.direction;
                        // Eyes: offset forward in direction, spaced perpendicular
                        var eyeFwd = 2;
                        var eyeSpread = 3;
                        var ex1 = hcx + hDir.x * eyeFwd + (-hDir.y) * eyeSpread;
                        var ey1 = hcy + hDir.y * eyeFwd + hDir.x * eyeSpread;
                        var ex2 = hcx + hDir.x * eyeFwd + hDir.y * eyeSpread;
                        var ey2 = hcy + hDir.y * eyeFwd + (-hDir.x) * eyeSpread;
                        ctx.beginPath();
                        ctx.arc(ex1, ey1, 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(ex2, ey2, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }

            // Teleport portals
            if (s.portals.length > 0) {
                var portalConfig = getLevelConfig(s.level);
                if (portalConfig.portalColor) {
                    var portalPulse = Math.sin(Date.now() / 300) * 0.3 + 0.7;
                    s.portals.forEach(function(pair) {
                        [pair.a, pair.b].forEach(function(pos) {
                            var pcx = pos.x * CELL_SIZE + CELL_SIZE / 2;
                            var pcy = pos.y * CELL_SIZE + CELL_SIZE / 2;
                            // Outer glow ring
                            ctx.shadowColor = portalConfig.portalColor;
                            ctx.shadowBlur = 12;
                            ctx.globalAlpha = portalPulse;
                            ctx.strokeStyle = portalConfig.portalColor;
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.arc(pcx, pcy, CELL_SIZE / 2 - 1, 0, Math.PI * 2);
                            ctx.stroke();
                            // Inner diamond
                            ctx.fillStyle = portalConfig.portalColor;
                            ctx.globalAlpha = portalPulse * 0.6;
                            ctx.beginPath();
                            ctx.moveTo(pcx, pcy - 5);
                            ctx.lineTo(pcx + 5, pcy);
                            ctx.lineTo(pcx, pcy + 5);
                            ctx.lineTo(pcx - 5, pcy);
                            ctx.closePath();
                            ctx.fill();
                            ctx.globalAlpha = 1;
                            ctx.shadowBlur = 0;
                        });
                    });
                }
            }

            // Power-up
            if (s.powerUp) {
                var puDef = getPowerUpDef(s.powerUp.type);
                if (puDef) {
                    var puCx = s.powerUp.x * CELL_SIZE + CELL_SIZE / 2;
                    var puCy = s.powerUp.y * CELL_SIZE + CELL_SIZE / 2;
                    var puPulse = Math.sin(Date.now() / 200) * 0.3 + 0.7;
                    // Glow
                    ctx.shadowColor = puDef.glowColor;
                    ctx.shadowBlur = 14;
                    ctx.globalAlpha = puPulse;

                    if (s.powerUp.type === 'timeSlow') {
                        // Hourglass shape (two triangles)
                        ctx.fillStyle = puDef.color;
                        ctx.beginPath();
                        ctx.moveTo(puCx - 5, puCy - 7);
                        ctx.lineTo(puCx + 5, puCy - 7);
                        ctx.lineTo(puCx, puCy);
                        ctx.closePath();
                        ctx.fill();
                        ctx.beginPath();
                        ctx.moveTo(puCx - 5, puCy + 7);
                        ctx.lineTo(puCx + 5, puCy + 7);
                        ctx.lineTo(puCx, puCy);
                        ctx.closePath();
                        ctx.fill();
                    } else if (s.powerUp.type === 'ghost') {
                        // Ghost silhouette (circle top + wavy bottom)
                        ctx.fillStyle = puDef.color;
                        ctx.beginPath();
                        ctx.arc(puCx, puCy - 2, 5, Math.PI, 0);
                        ctx.lineTo(puCx + 5, puCy + 5);
                        ctx.lineTo(puCx + 3, puCy + 3);
                        ctx.lineTo(puCx, puCy + 5);
                        ctx.lineTo(puCx - 3, puCy + 3);
                        ctx.lineTo(puCx - 5, puCy + 5);
                        ctx.closePath();
                        ctx.fill();
                    }

                    ctx.globalAlpha = 1;
                    ctx.shadowBlur = 0;
                }
            }

            // Food
            if (s.food) {
                ctx.fillStyle = config.foodColor;
                ctx.shadowColor = config.foodColor;
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(
                    s.food.x * CELL_SIZE + CELL_SIZE / 2,
                    s.food.y * CELL_SIZE + CELL_SIZE / 2,
                    CELL_SIZE / 2 - 2,
                    0, Math.PI * 2
                );
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Snake
            s.snake.forEach(function(seg, i) {
                var alpha = 1 - (i / s.snake.length) * 0.5;
                if (isGhost) alpha *= 0.45;
                if (konamiActivated) {
                    var hue = ((Date.now() / 10) + i * 20) % 360;
                    ctx.fillStyle = 'hsl(' + hue + ', 80%, 60%)';
                } else {
                    ctx.fillStyle = config.color;
                }
                ctx.globalAlpha = alpha;
                var padding = i === 0 ? 1 : 2;
                ctx.fillRect(
                    seg.x * CELL_SIZE + padding,
                    seg.y * CELL_SIZE + padding,
                    CELL_SIZE - padding * 2,
                    CELL_SIZE - padding * 2
                );
            });
            ctx.globalAlpha = 1;

            // Ghost aura around head
            if (isGhost && s.started && !s.gameOver) {
                var ghostPulse = Math.sin(Date.now() / 150) * 0.2 + 0.3;
                ctx.strokeStyle = 'rgba(226, 232, 240, ' + ghostPulse + ')';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(
                    s.snake[0].x * CELL_SIZE + CELL_SIZE / 2,
                    s.snake[0].y * CELL_SIZE + CELL_SIZE / 2,
                    CELL_SIZE / 2 + 3, 0, Math.PI * 2
                );
                ctx.stroke();
                ctx.lineWidth = 0.5;
            }

            // Fog of War overlay
            if (config.fogRadius && s.started && !s.gameOver) {
                var headPixX = s.snake[0].x * CELL_SIZE + CELL_SIZE / 2;
                var headPixY = s.snake[0].y * CELL_SIZE + CELL_SIZE / 2;
                var flicker = Math.sin(Date.now() / 200) * 0.05 + 1;
                var outerRadius = config.fogRadius * CELL_SIZE * flicker;
                var innerRadius = outerRadius * 0.4;

                var fogGrad = ctx.createRadialGradient(headPixX, headPixY, innerRadius, headPixX, headPixY, outerRadius);
                fogGrad.addColorStop(0, 'rgba(0, 0, 0, 0)');
                fogGrad.addColorStop(0.6, 'rgba(0, 0, 0, 0.7)');
                fogGrad.addColorStop(1, 'rgba(0, 0, 0, 0.97)');

                ctx.fillStyle = fogGrad;
                ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            }

            // Game over overlay
            if (s.gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

                ctx.fillStyle = '#ef4444';
                ctx.font = 'bold 28px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', CANVAS_SIZE / 2, CANVAS_SIZE / 2 - 20);

                ctx.fillStyle = '#888';
                ctx.font = '14px Courier New';
                ctx.fillText('Score: ' + s.score, CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 10);
                ctx.fillText('Press any arrow key to restart', CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 35);
                ctx.textAlign = 'left';
            }

            // HUD
            scoreEl.textContent = s.score;
            levelEl.textContent = s.level;

            // Power-up HUD indicator
            if (s.activePowerUp) {
                var activeDef = getPowerUpDef(s.activePowerUp.type);
                powerUpHudEl.style.display = 'block';
                powerUpNameEl.textContent = activeDef.name + ' [' + s.activePowerUp.ticksLeft + ']';
                powerUpNameEl.style.color = activeDef.color;
            } else {
                powerUpHudEl.style.display = 'none';
            }

            // Arena size HUD for shrinking levels
            if (config.shrinkingArena && s.started && !s.gameOver) {
                var aw = s.arenaMaxX - s.arenaMinX + 1;
                var ah = s.arenaMaxY - s.arenaMinY + 1;
                arenaHudEl.style.display = 'block';
                arenaSizeEl.textContent = aw + '\u00d7' + ah;
            } else {
                arenaHudEl.style.display = 'none';
            }
        }

        // --- Input ---
        var DIRECTION_MAP = {
            ArrowUp:    { x: 0, y: -1 },
            ArrowDown:  { x: 0, y: 1 },
            ArrowLeft:  { x: -1, y: 0 },
            ArrowRight: { x: 1, y: 0 },
        };

        document.addEventListener('keydown', function(e) {
            // Konami code detection (only before game starts)
            if (!state.started && !state.gameOver) {
                if (e.key === KONAMI_SEQUENCE[konamiProgress]) {
                    konamiProgress++;
                    e.preventDefault();
                    if (konamiProgress >= KONAMI_SEQUENCE.length) {
                        konamiActivated = !konamiActivated;
                        localStorage.setItem('snake-konami', String(konamiActivated));
                        messageEl.textContent = konamiActivated ? 'RAINBOW MODE ACTIVATED' : 'RAINBOW MODE OFF';
                        messageEl.className = konamiActivated ? 'rainbow' : 'active';
                        konamiProgress = 0;
                        setTimeout(function() {
                            if (!state.started) {
                                messageEl.textContent = 'Press any arrow key to start';
                                messageEl.className = '';
                            }
                        }, 2500);
                    }
                    return;
                }
                konamiProgress = 0;
            }

            var newDir = DIRECTION_MAP[e.key];
            if (!newDir) return;

            e.preventDefault();

            if (state.gameOver) {
                if (state.score > highScore) {
                    highScore = state.score;
                    localStorage.setItem('snake-highscore', String(highScore));
                    highScoreEl.textContent = highScore;
                }
                if (levelUpTimer) { clearTimeout(levelUpTimer); levelUpTimer = null; }
                if (powerUpMsgTimer) { clearTimeout(powerUpMsgTimer); powerUpMsgTimer = null; }
                if (shrinkMsgTimer) { clearTimeout(shrinkMsgTimer); shrinkMsgTimer = null; }
                state = createInitialState();
                state = Object.assign({}, state, {
                    started: true,
                    nextDirection: newDir,
                    food: randomPosition(state.snake, state.walls, state.obstacles, state.portals, state.powerUp, state.hunter),
                });
                messageEl.textContent = '';
                messageEl.className = '';
                messageEl.style.color = '';
                return;
            }

            if (!state.started) {
                state = Object.assign({}, state, {
                    started: true,
                    nextDirection: newDir,
                    food: randomPosition(state.snake, state.walls, state.obstacles, state.portals, state.powerUp, state.hunter),
                });
                messageEl.textContent = '';
                messageEl.className = '';
                return;
            }

            // Prevent 180-degree reversal
            var isOpposite = (newDir.x + state.direction.x === 0 && newDir.y + state.direction.y === 0);
            if (!isOpposite) {
                state = Object.assign({}, state, { nextDirection: newDir });
            }
        });

        // --- Game loop ---
        function gameLoop(timestamp) {
            var config = getLevelConfig(state.level);
            var speed = config.speed;

            // Time slow power-up doubles the tick interval (slows game down)
            if (state.activePowerUp && state.activePowerUp.type === 'timeSlow') {
                speed = speed * 2;
            }

            var elapsed = timestamp - state.lastTick;

            if (elapsed >= speed) {
                var prevLevel = state.level;
                var prevState = state;
                state = tick(Object.assign({}, state, { lastTick: timestamp }));
                state = Object.assign({}, state, { lastTick: timestamp });

                if (state.level > prevLevel) {
                    showLevelUp(state.level);
                }

                // Show power-up collected message
                if (state._collectedPowerUp) {
                    var collectedDef = getPowerUpDef(state._collectedPowerUp);
                    if (collectedDef) showPowerUpCollected(collectedDef);
                }

                // Show shrink warning message
                if (state._shrinkOccurred) {
                    showShrinkMessage();
                }
            }

            render(state);
            requestAnimationFrame(gameLoop);
        }

        // --- Start ---
        render(state);
        requestAnimationFrame(gameLoop);
    })();
    </script>
</body>
</html>
