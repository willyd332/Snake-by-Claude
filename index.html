<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game — The Blue Computer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 1.4rem;
            color: #4a9eff;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        #hud {
            display: flex;
            gap: 32px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        #hud span {
            color: #888;
        }

        #hud .value {
            color: #4a9eff;
            font-weight: bold;
        }

        canvas {
            border: 2px solid #1a3a5c;
            border-radius: 4px;
            background: #0d1117;
        }

        #message {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #666;
            height: 20px;
        }

        #message.active {
            color: #4a9eff;
        }

        #message.levelup {
            color: #f59e0b;
            font-weight: bold;
            animation: pulse 0.5s ease-in-out 3;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <h1>SNAKE</h1>
    <div id="hud">
        <div><span>Score:</span> <span class="value" id="score">0</span></div>
        <div><span>Level:</span> <span class="value" id="level">1</span></div>
        <div><span>High:</span> <span class="value" id="highScore">0</span></div>
    </div>
    <canvas id="game" width="400" height="400"></canvas>
    <div id="message">Press any arrow key to start</div>

    <script>
    (function() {
        'use strict';

        // --- Constants ---
        var GRID_SIZE = 20;
        var CELL_SIZE = 20;
        var CANVAS_SIZE = GRID_SIZE * CELL_SIZE;
        var FOOD_TO_LEVEL_UP = 5;

        var LEVEL_CONFIG = {
            1: { speed: 150, color: '#22c55e', foodColor: '#ef4444', wallColor: null,      bgAccent: '#0d1117', gridAlpha: 0.03, obstacleColor: null },
            2: { speed: 120, color: '#3b82f6', foodColor: '#f59e0b', wallColor: '#1e3a5f', bgAccent: '#0d1320', gridAlpha: 0.04, obstacleColor: null },
            3: { speed: 90,  color: '#a855f7', foodColor: '#ec4899', wallColor: '#3b1f5e', bgAccent: '#130d1a', gridAlpha: 0.05, obstacleColor: '#7c3aed' },
            4: { speed: 75,  color: '#f97316', foodColor: '#06b6d4', wallColor: '#78350f', bgAccent: '#1a0f0a', gridAlpha: 0.06, obstacleColor: '#ea580c' },
        };

        var MAX_LEVEL = Object.keys(LEVEL_CONFIG).length;

        // --- Wall patterns ---
        function generateWalls(level) {
            var walls = [];
            if (level <= 1) return walls;

            if (level === 2) {
                // Diamond pattern: four short segments around center
                [8, 9, 10, 11].forEach(function(x) { walls.push({ x: x, y: 5 }); });
                [8, 9, 10, 11].forEach(function(x) { walls.push({ x: x, y: 14 }); });
                [8, 9, 10, 11].forEach(function(y) { walls.push({ x: 5, y: y }); });
                [8, 9, 10, 11].forEach(function(y) { walls.push({ x: 14, y: y }); });
                return walls;
            }

            if (level === 3) {
                // Corridor pattern with pillars
                [2, 3, 4, 5, 6, 7].forEach(function(x) { walls.push({ x: x, y: 6 }); });
                [12, 13, 14, 15, 16, 17].forEach(function(x) { walls.push({ x: x, y: 6 }); });
                [2, 3, 4, 5, 6, 7].forEach(function(x) { walls.push({ x: x, y: 13 }); });
                [12, 13, 14, 15, 16, 17].forEach(function(x) { walls.push({ x: x, y: 13 }); });
                [3, 4, 5].forEach(function(y) { walls.push({ x: 10, y: y }); });
                [14, 15, 16].forEach(function(y) { walls.push({ x: 10, y: y }); });
                walls.push({ x: 3, y: 3 }, { x: 16, y: 3 });
                walls.push({ x: 3, y: 16 }, { x: 16, y: 16 });
                return walls;
            }

            // Level 4: cage ring with cardinal gaps
            [5, 6, 7, 8, 11, 12, 13, 14].forEach(function(x) { walls.push({ x: x, y: 4 }); });
            [5, 6, 7, 8, 11, 12, 13, 14].forEach(function(x) { walls.push({ x: x, y: 15 }); });
            [5, 6, 7, 8, 11, 12, 13, 14].forEach(function(y) { walls.push({ x: 4, y: y }); });
            [5, 6, 7, 8, 11, 12, 13, 14].forEach(function(y) { walls.push({ x: 15, y: y }); });
            // Inner cross pillars
            walls.push({ x: 9, y: 7 }, { x: 10, y: 7 });
            walls.push({ x: 9, y: 12 }, { x: 10, y: 12 });
            walls.push({ x: 7, y: 9 }, { x: 7, y: 10 });
            walls.push({ x: 12, y: 9 }, { x: 12, y: 10 });

            return walls;
        }

        function filterWallsFromSnake(walls, snake) {
            return walls.filter(function(w) {
                return !snake.some(function(seg) { return seg.x === w.x && seg.y === w.y; });
            });
        }

        // --- Moving obstacles ---
        function generateObstacles(level) {
            if (level < 3) return [];

            if (level === 3) {
                // Two horizontal patrols through corridor gaps
                return [
                    { x: 8, y: 9, path: [8, 9, 10, 11], axis: 'x', pathIndex: 0, dir: 1 },
                    { x: 11, y: 10, path: [11, 10, 9, 8], axis: 'x', pathIndex: 0, dir: 1 },
                ];
            }

            // Level 4: four patrols circling through cage gaps
            return [
                { x: 9, y: 1, path: [1, 2, 3], axis: 'y', pathIndex: 0, dir: 1 },
                { x: 10, y: 16, path: [16, 17, 18], axis: 'y', pathIndex: 0, dir: 1 },
                { x: 1, y: 9, path: [1, 2, 3], axis: 'x', pathIndex: 0, dir: 1 },
                { x: 18, y: 10, path: [18, 17, 16], axis: 'x', pathIndex: 0, dir: 1 },
            ];
        }

        function moveObstacles(obstacles) {
            return obstacles.map(function(ob) {
                var nextIdx = ob.pathIndex + ob.dir;
                var newDir = ob.dir;
                if (nextIdx >= ob.path.length || nextIdx < 0) {
                    newDir = -ob.dir;
                    nextIdx = ob.pathIndex + newDir;
                }
                var newOb = { x: ob.x, y: ob.y, path: ob.path, axis: ob.axis, pathIndex: nextIdx, dir: newDir };
                if (ob.axis === 'x') {
                    newOb.x = ob.path[nextIdx];
                } else {
                    newOb.y = ob.path[nextIdx];
                }
                return newOb;
            });
        }

        function getObstaclePositions(obstacles) {
            return obstacles.map(function(ob) { return { x: ob.x, y: ob.y }; });
        }

        // --- Canvas setup ---
        var canvas = document.getElementById('game');
        var ctx = canvas.getContext('2d');
        canvas.width = CANVAS_SIZE;
        canvas.height = CANVAS_SIZE;

        var scoreEl = document.getElementById('score');
        var levelEl = document.getElementById('level');
        var highScoreEl = document.getElementById('highScore');
        var messageEl = document.getElementById('message');

        // --- Level-up message ---
        var levelUpTimer = null;

        function showLevelUp(level) {
            messageEl.textContent = 'LEVEL ' + level + '!';
            messageEl.className = 'levelup';
            if (levelUpTimer) clearTimeout(levelUpTimer);
            levelUpTimer = setTimeout(function() {
                messageEl.textContent = '';
                messageEl.className = '';
                levelUpTimer = null;
            }, 2000);
        }

        // --- State ---
        function createInitialState() {
            return {
                snake: [{ x: 10, y: 10 }],
                direction: { x: 0, y: 0 },
                nextDirection: { x: 0, y: 0 },
                food: null,
                walls: [],
                obstacles: [],
                score: 0,
                level: 1,
                foodEaten: 0,
                gameOver: false,
                started: false,
                lastTick: 0,
            };
        }

        var state = createInitialState();
        var highScore = parseInt(localStorage.getItem('snake-highscore') || '0', 10);
        highScoreEl.textContent = highScore;

        // --- Pure helpers ---
        function randomPosition(snake, walls, obstacles) {
            var obPositions = obstacles ? getObstaclePositions(obstacles) : [];
            var occupied = (walls || []).concat(snake).concat(obPositions);
            var pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE),
                };
            } while (occupied.some(function(seg) { return seg.x === pos.x && seg.y === pos.y; }));
            return pos;
        }

        function getLevelConfig(level) {
            var clamped = Math.min(level, MAX_LEVEL);
            return LEVEL_CONFIG[clamped];
        }

        function collides(pos, segments) {
            return segments.some(function(seg) { return seg.x === pos.x && seg.y === pos.y; });
        }

        // --- State transitions (immutable) ---
        function tick(prev) {
            if (prev.gameOver || !prev.started) return prev;

            var dir = prev.nextDirection;
            if (dir.x === 0 && dir.y === 0) return prev;

            var head = prev.snake[0];
            var newHead = { x: head.x + dir.x, y: head.y + dir.y };

            // Wall boundary collision
            if (newHead.x < 0 || newHead.x >= GRID_SIZE ||
                newHead.y < 0 || newHead.y >= GRID_SIZE) {
                return Object.assign({}, prev, { gameOver: true, direction: dir });
            }

            // Wall obstacle collision
            if (collides(newHead, prev.walls)) {
                return Object.assign({}, prev, { gameOver: true, direction: dir });
            }

            // Self collision
            if (collides(newHead, prev.snake)) {
                return Object.assign({}, prev, { gameOver: true, direction: dir });
            }

            // Moving obstacle collision
            if (prev.obstacles.length > 0 && collides(newHead, getObstaclePositions(prev.obstacles))) {
                return Object.assign({}, prev, { gameOver: true, direction: dir });
            }

            // Move obstacles
            var newObstacles = prev.obstacles.length > 0 ? moveObstacles(prev.obstacles) : prev.obstacles;

            // Check if obstacle moved onto snake body
            if (newObstacles.length > 0) {
                var obPositions = getObstaclePositions(newObstacles);
                var snakeHit = obPositions.some(function(op) { return collides(op, [newHead].concat(prev.snake)); });
                if (snakeHit) {
                    return Object.assign({}, prev, { gameOver: true, direction: dir });
                }
            }

            var ate = prev.food && newHead.x === prev.food.x && newHead.y === prev.food.y;
            var newSnake = [newHead].concat(ate ? prev.snake : prev.snake.slice(0, -1));
            var newScore = ate ? prev.score + 10 : prev.score;
            var newFoodEaten = ate ? prev.foodEaten + 1 : prev.foodEaten;
            var newLevel = prev.level;
            var newWalls = prev.walls;
            var newFood = ate ? null : prev.food;

            // Level up check
            if (newFoodEaten >= FOOD_TO_LEVEL_UP && newLevel < MAX_LEVEL) {
                newLevel = prev.level + 1;
                newFoodEaten = 0;
                newWalls = filterWallsFromSnake(generateWalls(newLevel), newSnake);
                newObstacles = generateObstacles(newLevel);
            }

            // Spawn food if needed (avoid snake, walls, and obstacles)
            if (!newFood) {
                newFood = randomPosition(newSnake, newWalls, newObstacles);
            }

            return {
                snake: newSnake,
                direction: dir,
                nextDirection: dir,
                food: newFood,
                walls: newWalls,
                obstacles: newObstacles,
                score: newScore,
                level: newLevel,
                foodEaten: newFoodEaten,
                gameOver: false,
                started: true,
                lastTick: prev.lastTick,
            };
        }

        // --- Rendering ---
        function render(s) {
            var config = getLevelConfig(s.level);

            // Clear
            ctx.fillStyle = config.bgAccent;
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // Grid lines (subtle, varies by level)
            ctx.strokeStyle = 'rgba(255, 255, 255, ' + config.gridAlpha + ')';
            ctx.lineWidth = 0.5;
            for (var i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, CANVAS_SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(CANVAS_SIZE, i * CELL_SIZE);
                ctx.stroke();
            }

            // Walls
            if (s.walls.length > 0 && config.wallColor) {
                ctx.shadowColor = config.wallColor;
                ctx.shadowBlur = 4;
                s.walls.forEach(function(w) {
                    ctx.fillStyle = config.wallColor;
                    ctx.fillRect(
                        w.x * CELL_SIZE + 1,
                        w.y * CELL_SIZE + 1,
                        CELL_SIZE - 2,
                        CELL_SIZE - 2
                    );
                    // Inner highlight
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                    ctx.fillRect(
                        w.x * CELL_SIZE + 3,
                        w.y * CELL_SIZE + 3,
                        CELL_SIZE - 6,
                        CELL_SIZE - 6
                    );
                });
                ctx.shadowBlur = 0;
            }

            // Moving obstacles
            if (s.obstacles.length > 0 && config.obstacleColor) {
                s.obstacles.forEach(function(ob) {
                    var cx = ob.x * CELL_SIZE + CELL_SIZE / 2;
                    var cy = ob.y * CELL_SIZE + CELL_SIZE / 2;
                    // Pulsing glow
                    ctx.shadowColor = config.obstacleColor;
                    ctx.shadowBlur = 10;
                    ctx.fillStyle = config.obstacleColor;
                    ctx.beginPath();
                    ctx.arc(cx, cy, CELL_SIZE / 2 - 1, 0, Math.PI * 2);
                    ctx.fill();
                    // Bright center dot
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.beginPath();
                    ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });
            }

            // Food
            if (s.food) {
                ctx.fillStyle = config.foodColor;
                ctx.shadowColor = config.foodColor;
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(
                    s.food.x * CELL_SIZE + CELL_SIZE / 2,
                    s.food.y * CELL_SIZE + CELL_SIZE / 2,
                    CELL_SIZE / 2 - 2,
                    0, Math.PI * 2
                );
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Snake
            s.snake.forEach(function(seg, i) {
                var alpha = 1 - (i / s.snake.length) * 0.5;
                ctx.fillStyle = config.color;
                ctx.globalAlpha = alpha;
                var padding = i === 0 ? 1 : 2;
                ctx.fillRect(
                    seg.x * CELL_SIZE + padding,
                    seg.y * CELL_SIZE + padding,
                    CELL_SIZE - padding * 2,
                    CELL_SIZE - padding * 2
                );
            });
            ctx.globalAlpha = 1;

            // Game over overlay
            if (s.gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

                ctx.fillStyle = '#ef4444';
                ctx.font = 'bold 28px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', CANVAS_SIZE / 2, CANVAS_SIZE / 2 - 20);

                ctx.fillStyle = '#888';
                ctx.font = '14px Courier New';
                ctx.fillText('Score: ' + s.score, CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 10);
                ctx.fillText('Press any arrow key to restart', CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 35);
                ctx.textAlign = 'left';
            }

            // HUD
            scoreEl.textContent = s.score;
            levelEl.textContent = s.level;
        }

        // --- Input ---
        var DIRECTION_MAP = {
            ArrowUp:    { x: 0, y: -1 },
            ArrowDown:  { x: 0, y: 1 },
            ArrowLeft:  { x: -1, y: 0 },
            ArrowRight: { x: 1, y: 0 },
        };

        document.addEventListener('keydown', function(e) {
            var newDir = DIRECTION_MAP[e.key];
            if (!newDir) return;

            e.preventDefault();

            if (state.gameOver) {
                if (state.score > highScore) {
                    highScore = state.score;
                    localStorage.setItem('snake-highscore', String(highScore));
                    highScoreEl.textContent = highScore;
                }
                state = createInitialState();
                state = Object.assign({}, state, {
                    started: true,
                    nextDirection: newDir,
                    food: randomPosition(state.snake, state.walls, state.obstacles),
                });
                messageEl.textContent = '';
                messageEl.className = '';
                return;
            }

            if (!state.started) {
                state = Object.assign({}, state, {
                    started: true,
                    nextDirection: newDir,
                    food: randomPosition(state.snake, state.walls, state.obstacles),
                });
                messageEl.textContent = '';
                messageEl.className = '';
                return;
            }

            // Prevent 180-degree reversal
            var isOpposite = (newDir.x + state.direction.x === 0 && newDir.y + state.direction.y === 0);
            if (!isOpposite) {
                state = Object.assign({}, state, { nextDirection: newDir });
            }
        });

        // --- Game loop ---
        function gameLoop(timestamp) {
            var config = getLevelConfig(state.level);
            var elapsed = timestamp - state.lastTick;

            if (elapsed >= config.speed) {
                var prevLevel = state.level;
                state = tick(Object.assign({}, state, { lastTick: timestamp }));
                state = Object.assign({}, state, { lastTick: timestamp });

                if (state.level > prevLevel) {
                    showLevelUp(state.level);
                }
            }

            render(state);
            requestAnimationFrame(gameLoop);
        }

        // --- Start ---
        render(state);
        requestAnimationFrame(gameLoop);
    })();
    </script>
</body>
</html>
