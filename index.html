<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake, by Claude</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta property="og:title" content="Snake, by Claude">
    <meta property="og:description" content="An endless snake game built by Claude.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 8px;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            position: relative;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 1.4rem;
            color: #4a9eff;
            margin-bottom: 8px;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 10px rgba(74, 158, 255, 0.5), 0 0 20px rgba(74, 158, 255, 0.2);
        }

        #hud {
            display: flex;
            gap: 32px;
            margin-bottom: 8px;
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }

        #hud span {
            color: #999;
            text-shadow: 0 0 4px rgba(150, 150, 170, 0.3);
        }

        #hud .value {
            color: #4a9eff;
            font-weight: bold;
            text-shadow: 0 0 6px rgba(74, 158, 255, 0.4);
        }

        #powerUpHud {
            display: none;
        }

        #powerUpHud .value {
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        #livesHud .value {
            color: #ef4444;
        }

        #comboHud .value {
            color: #f59e0b;
            font-weight: bold;
            letter-spacing: 1px;
            animation: comboPulse 0.4s ease-in-out infinite alternate;
        }

        #streakHud .value {
            color: #f97316;
            font-weight: bold;
            letter-spacing: 1px;
        }

        @keyframes comboPulse {
            0% { opacity: 0.85; }
            100% { opacity: 1; text-shadow: 0 0 8px #f59e0b; }
        }

        #game {
            border: 2px solid #1a3a5c;
            border-radius: 4px;
            background: #0d1117;
            touch-action: none;
            max-width: calc(100vw - 24px);
            max-height: calc(100vh - 120px);
            aspect-ratio: 1 / 1;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.08), 0 0 40px rgba(74, 158, 255, 0.04);
        }

        #message {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #666;
            height: 20px;
            position: relative;
            z-index: 1;
        }

        #message.active {
            color: #4a9eff;
        }

        #message.levelup {
            color: #f59e0b;
            font-weight: bold;
            animation: pulse 0.5s ease-in-out 3;
        }

        #message.narrative {
            color: #8888aa;
            font-style: italic;
            letter-spacing: 1px;
        }

        #message.rainbow {
            background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #0077ff, #8b00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
            animation: pulse 0.3s ease-in-out 6;
        }

        #message.powerup-msg {
            font-weight: bold;
            letter-spacing: 1px;
            animation: pulse 0.4s ease-in-out 2;
        }

        #message.secret {
            font-weight: bold;
            letter-spacing: 2px;
            animation: pulse 0.3s ease-in-out 4;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @media (max-width: 440px) {
            h1 { font-size: 1.1rem; margin-bottom: 4px; }
            #hud { gap: 16px; font-size: 0.75rem; margin-bottom: 4px; }
            #message { font-size: 0.75rem; margin-top: 6px; }
        }

        @media (max-height: 580px) {
            h1 { font-size: 1rem; margin-bottom: 2px; }
            #hud { gap: 12px; font-size: 0.7rem; margin-bottom: 2px; }
            #message { font-size: 0.7rem; margin-top: 4px; }
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <h1 id="title">SNAKE</h1>
    <div id="hud">
        <div><span>Score:</span> <span class="value" id="score">0</span></div>
        <div><span id="levelLabel">Wave:</span> <span class="value" id="level">1</span></div>
        <div><span>High:</span> <span class="value" id="highScore">0</span></div>
        <div id="powerUpHud"><span class="value" id="powerUpName"></span></div>
        <div id="arenaHud" style="display:none"><span>Arena:</span> <span class="value" id="arenaSize"></span></div>
        <div id="livesHud" style="display:none"><span>Lives:</span> <span class="value" id="lives">3</span></div>
        <div id="comboHud" style="display:none"><span class="value" id="comboLabel"></span></div>
        <div id="streakHud" style="display:none"><span>Streak:</span> <span class="value" id="streakLabel"></span></div>
    </div>
    <canvas id="game" width="400" height="400"></canvas>
    <div id="message">Arrow keys or swipe to start</div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
