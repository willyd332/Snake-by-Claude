<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Game — The Blue Computer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 8px;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        h1 {
            font-size: 1.4rem;
            color: #4a9eff;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        #hud {
            display: flex;
            gap: 32px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        #hud span {
            color: #888;
        }

        #hud .value {
            color: #4a9eff;
            font-weight: bold;
        }

        #powerUpHud {
            display: none;
        }

        #powerUpHud .value {
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        canvas {
            border: 2px solid #1a3a5c;
            border-radius: 4px;
            background: #0d1117;
            touch-action: none;
            max-width: calc(100vw - 24px);
            max-height: calc(100vh - 120px);
            aspect-ratio: 1 / 1;
        }

        #message {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #666;
            height: 20px;
        }

        #message.active {
            color: #4a9eff;
        }

        #message.levelup {
            color: #f59e0b;
            font-weight: bold;
            animation: pulse 0.5s ease-in-out 3;
        }

        #message.narrative {
            color: #8888aa;
            font-style: italic;
            letter-spacing: 1px;
        }

        #message.rainbow {
            background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #0077ff, #8b00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
            animation: pulse 0.3s ease-in-out 6;
        }

        #message.powerup-msg {
            font-weight: bold;
            letter-spacing: 1px;
            animation: pulse 0.4s ease-in-out 2;
        }

        #message.secret {
            font-weight: bold;
            letter-spacing: 2px;
            animation: pulse 0.3s ease-in-out 4;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @media (max-width: 440px) {
            h1 { font-size: 1.1rem; margin-bottom: 4px; }
            #hud { gap: 16px; font-size: 0.75rem; margin-bottom: 4px; }
            #message { font-size: 0.75rem; margin-top: 6px; }
        }

        @media (max-height: 580px) {
            h1 { font-size: 1rem; margin-bottom: 2px; }
            #hud { gap: 12px; font-size: 0.7rem; margin-bottom: 2px; }
            #message { font-size: 0.7rem; margin-top: 4px; }
        }
    </style>
</head>
<body>
    <h1 id="title">SNAKE</h1>
    <div id="hud">
        <div><span>Score:</span> <span class="value" id="score">0</span></div>
        <div><span id="levelLabel">Level:</span> <span class="value" id="level">1</span></div>
        <div><span>High:</span> <span class="value" id="highScore">0</span></div>
        <div id="powerUpHud"><span class="value" id="powerUpName"></span></div>
        <div id="arenaHud" style="display:none"><span>Arena:</span> <span class="value" id="arenaSize"></span></div>
    </div>
    <canvas id="game" width="400" height="400"></canvas>
    <div id="message">Arrow keys or swipe to start</div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
